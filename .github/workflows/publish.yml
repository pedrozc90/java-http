name: Publish to GitHub Packages

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    java-version: '8'
                    distribution: 'temurin'
                    cache: 'maven'
                    server-id: github
                    server-username: GITHUB_ACTOR
                    server-password: GITHUB_TOKEN

            -   name: Extract version from tag
                id: version
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"
                    if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                      echo "Error: tag does not produce a valid semver version: $VERSION"
                      exit 1
                    fi
                    echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

            -   name: Set project version
                run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

            -   name: Set release version from tag
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"
                    mvn --no-transfer-progress versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

            -   name: Build and run tests
                run: mvn --no-transfer-progress --batch-mode verify

            -   name: Publish package
                run: mvn --no-transfer-progress --batch-mode deploy -Dmaven.test.skip=true
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
